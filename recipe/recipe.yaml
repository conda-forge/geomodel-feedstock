schema_version: 1

context:
  version: "6.27.0"
  build_number: 3

recipe:
  name: geomodel-split
  version: ${{ version }}

source:
  url: https://gitlab.cern.ch/GeoModelDev/GeoModel/-/archive/${{ version }}/GeoModel-${{ version }}.tar.gz
  sha256: 018c5087b70d956793d06dc040f842018eb3bedd9b2f175c6090af63ce963408

build:
  number: ${{ build_number }}
  # osx skipped initially: the GeoModelVisualization stack depends on the
  # linux-only X11 / GLVND / EGL deps in the staging host. macOS support
  # can be added in a follow-up once the feedstock exists.
  skip:
    - win
    - osx

outputs:

  # ---- Shared build stage --------------------------------------------------
  - staging:
      name: geomodel-build
    build:
      script: build.sh
    requirements:
      build:
        - ${{ compiler('cxx') }}
        - ${{ stdlib('c') }}
        - cmake
        - make
      host:
        - sqlite
        - xerces-c
        - nlohmann_json
        # GeoModelKernel exposes Eigen::Matrix in public headers; per
        # conda-forge eigen-feedstock README case C, the package that
        # links Eigen depends on eigen-abi-devel so the ABI marker
        # (eigen-abi) is pinned correctly.
        - eigen-abi-devel
        - geant4
        - qt6-main
        - coin3d
        - soqt6
        - hdf5
        - libglvnd-devel
        - libegl-devel
        - libopengl-devel
        - libglu
        - xorg-libx11
        - xorg-libxext

  # ---- Core + IO (runtime libraries) --------------------------------------
  - package:
      name: geomodel-core
      version: ${{ version }}
    inherit: geomodel-build
    build:
      files:
        - lib/libGeoGenericFunctions.so*
        - lib/libGeoModelKernel.so*
        - lib/libGeoModelHelpers.so*
        - lib/libGeoModelDBManager.so*
        - lib/libGeoModelIOHelpers.so*
        - lib/libGeoModelRead.so*
        - lib/libGeoModelWrite.so*
        - lib/libTFPersistification.so*
    requirements:
      build:
        - ${{ compiler('cxx') }}
        - ${{ stdlib('c') }}
      host:
        - eigen-abi-devel
        - sqlite
      run_exports:
        weak:
          - ${{ pin_subpackage('geomodel-core', upper_bound='x.x') }}
    tests:
      - package_contents:
          lib:
            - GeoModelKernel
            - GeoModelHelpers
            - GeoGenericFunctions
            - GeoModelDBManager
            - GeoModelRead
            - GeoModelWrite
            - GeoModelIOHelpers
            - TFPersistification
    about:
      homepage: https://geomodel.web.cern.ch/
      repository: https://gitlab.cern.ch/GeoModelDev/GeoModel
      summary: GeoModel core kernel and I/O libraries
      description: |
        Core GeoModel libraries (GeoModelKernel, GeoModelHelpers,
        GeoGenericFunctions) and the I/O layer (GeoModelDBManager,
        GeoModelRead, GeoModelWrite, TFPersistification) for reading
        and writing GeoModel SQLite geometry files.
      license: Apache-2.0
      license_file: LICENSE

  # ---- Core + IO development files (headers + CMake configs) --------------
  - package:
      name: geomodel-core-devel
      version: ${{ version }}
    inherit: geomodel-build
    build:
      files:
        - include/GeoGenericFunctions/**
        - include/GeoModelKernel/**
        - include/GeoModelHelpers/**
        - include/GeoModelDBManager/**
        - include/GeoModelIOHelpers/**
        - include/GeoModelRead/**
        - include/GeoModelWrite/**
        - include/TFPersistification/**
        - lib/cmake/GeoModelCore/**
        - lib/cmake/GeoModelIO/**
    requirements:
      host:
        # eigen-abi-devel must be in host so pin_compatible('eigen-abi')
        # below can resolve against eigen-abi (which eigen-abi-devel
        # depends on).
        - ${{ pin_subpackage('geomodel-core', exact=True) }}
        - eigen-abi-devel
        - sqlite
      run:
        - ${{ pin_subpackage('geomodel-core', exact=True) }}
        # eigen-abi-devel exposes eigen at consumer build time
        # (find_dependency(Eigen3 ...) in GeoModelCoreConfig.cmake);
        # eigen-feedstock README case C.
        - eigen-abi-devel
        - sqlite
      run_exports:
        weak:
          - ${{ pin_subpackage('geomodel-core', upper_bound='x.x') }}
          - ${{ pin_compatible('eigen-abi', upper_bound='x.x.x.x') }}
    tests:
      - package_contents:
          files:
            - lib/cmake/GeoModelCore/GeoModelCoreConfig.cmake
            - lib/cmake/GeoModelIO/GeoModelIOConfig.cmake
    about:
      homepage: https://geomodel.web.cern.ch/
      repository: https://gitlab.cern.ch/GeoModelDev/GeoModel
      summary: GeoModel core development files (headers + CMake configs)
      description: |
        Development files for geomodel-core: public headers under
        include/GeoModelKernel etc. and CMake package configs under
        lib/cmake/GeoModelCore and lib/cmake/GeoModelIO. Depend on this
        package in a recipe's host: to build a downstream library that
        uses GeoModelCore via find_package.
      license: Apache-2.0
      license_file: LICENSE

  # ---- Tools (XML/JSON parsers + CLI utilities) ---------------------------
  - package:
      name: geomodel-tools
      version: ${{ version }}
    inherit: geomodel-build
    build:
      files:
        - lib/libExpressionEvaluator.so*
        - lib/libGDMLtoGM.so*
        - lib/libGeoModelJSONParser.so*
        - lib/libGeoModelValidation.so*
        - lib/libGeoModelXMLDumper.so*
        - lib/libGeoModelXMLParser.so*
        - lib/libGeoModelXml.so*
        - lib/libGMXPlugin.so*
        - bin/gmcat
        - bin/gmstatistics
        - bin/gmintegritycheck
        - bin/gdml2gm
        - bin/dumpGeoXML
        - share/GeoModelXml/**
        - share/man/man1/gmcat.1
        - share/man/man1/gmstatistics.1
        - share/man/man1/gmintegritycheck.1
    requirements:
      build:
        - ${{ compiler('cxx') }}
        - ${{ stdlib('c') }}
      host:
        - ${{ pin_subpackage('geomodel-core', exact=True) }}
        - eigen-abi-devel
        - xerces-c
        - nlohmann_json
      run_exports:
        weak:
          - ${{ pin_subpackage('geomodel-tools', upper_bound='x.x') }}
    tests:
      - package_contents:
          lib:
            - GeoModelXMLParser
            - GeoModelJSONParser
          bin:
            - gmcat
            - gmstatistics
            - gmintegritycheck
    about:
      homepage: https://geomodel.web.cern.ch/
      repository: https://gitlab.cern.ch/GeoModelDev/GeoModel
      summary: GeoModel command-line tools and XML/JSON parsers
      description: |
        GeoModelTools provides XML and JSON parsers for GeoModel
        descriptions, plus command-line utilities (gmcat,
        gmstatistics, gmintegritycheck, gdml2gm, dumpGeoXML) for
        working with GeoModel SQLite geometry files.
      license: Apache-2.0
      license_file: LICENSE

  # ---- Tools development files --------------------------------------------
  - package:
      name: geomodel-tools-devel
      version: ${{ version }}
    inherit: geomodel-build
    build:
      files:
        - include/ExpressionEvaluator/**
        - include/GDMLInterface/**
        - include/GeoModelJSONParser/**
        - include/GeoModelValidation/**
        - include/GeoModelXMLDumper/**
        - include/GeoModelXMLParser/**
        - include/GeoModelXml/**
        - lib/cmake/GeoModelTools/**
    requirements:
      host:
        - ${{ pin_subpackage('geomodel-tools', exact=True) }}
        - ${{ pin_subpackage('geomodel-core-devel', exact=True) }}
        - eigen-abi-devel
        - xerces-c
        - nlohmann_json
      run:
        - ${{ pin_subpackage('geomodel-tools', exact=True) }}
        - ${{ pin_subpackage('geomodel-core-devel', exact=True) }}
        - eigen-abi-devel
        - xerces-c
        - nlohmann_json
      run_exports:
        weak:
          - ${{ pin_subpackage('geomodel-tools', upper_bound='x.x') }}
          - ${{ pin_compatible('eigen-abi', upper_bound='x.x.x.x') }}
    tests:
      - package_contents:
          files:
            - lib/cmake/GeoModelTools/GeoModelToolsConfig.cmake
    about:
      homepage: https://geomodel.web.cern.ch/
      repository: https://gitlab.cern.ch/GeoModelDev/GeoModel
      summary: GeoModel tools development files (headers + CMake configs)
      description: |
        Development files for geomodel-tools: parser/dumper public
        headers and the GeoModelTools CMake package config. Depend on
        this in host: to build against GeoModelTools.
      license: Apache-2.0
      license_file: LICENSE

  # ---- Geant4 interface (runtime libraries) -------------------------------
  - package:
      name: geomodel-g4
      version: ${{ version }}
    inherit: geomodel-build
    build:
      files:
        - lib/libGeoMaterial2G4.so*
        - lib/libGeoModel2G4.so*
    requirements:
      build:
        - ${{ compiler('cxx') }}
        - ${{ stdlib('c') }}
      host:
        - ${{ pin_subpackage('geomodel-core', exact=True) }}
        - eigen-abi-devel
        - geant4
      run_exports:
        weak:
          - ${{ pin_subpackage('geomodel-g4', upper_bound='x.x') }}
    tests:
      - package_contents:
          lib:
            - GeoMaterial2G4
            - GeoModel2G4
    about:
      homepage: https://geomodel.web.cern.ch/
      repository: https://gitlab.cern.ch/GeoModelDev/GeoModel
      summary: GeoModel to Geant4 conversion libraries
      description: |
        GeoModelG4 converts GeoModel geometry trees and materials into
        Geant4 logical volumes, enabling GeoModel-described detectors
        to be simulated with Geant4.
      license: Apache-2.0
      license_file: LICENSE

  # ---- Geant4 interface development files ---------------------------------
  - package:
      name: geomodel-g4-devel
      version: ${{ version }}
    inherit: geomodel-build
    build:
      files:
        - include/GeoMaterial2G4/**
        - include/GeoModel2G4/**
        - lib/cmake/GeoModelG4/**
    requirements:
      host:
        - ${{ pin_subpackage('geomodel-g4', exact=True) }}
        - ${{ pin_subpackage('geomodel-core-devel', exact=True) }}
        - eigen-abi-devel
        - geant4
      run:
        - ${{ pin_subpackage('geomodel-g4', exact=True) }}
        - ${{ pin_subpackage('geomodel-core-devel', exact=True) }}
        - eigen-abi-devel
        - geant4
      run_exports:
        weak:
          - ${{ pin_subpackage('geomodel-g4', upper_bound='x.x') }}
          - ${{ pin_compatible('eigen-abi', upper_bound='x.x.x.x') }}
    tests:
      - package_contents:
          files:
            - lib/cmake/GeoModelG4/GeoModelG4Config.cmake
    about:
      homepage: https://geomodel.web.cern.ch/
      repository: https://gitlab.cern.ch/GeoModelDev/GeoModel
      summary: GeoModel G4 development files (headers + CMake configs)
      description: |
        Development files for geomodel-g4: GeoMaterial2G4/GeoModel2G4
        public headers and the GeoModelG4 CMake package config. Depend
        on this in host: to build against GeoModelG4.
      license: Apache-2.0
      license_file: LICENSE

  # ---- FullSimLight (Geant4-based simulation driver) ----------------------
  - package:
      name: geomodel-fullsimlight
      version: ${{ version }}
    inherit: geomodel-build
    build:
      files:
        - bin/fullSimLight
        - bin/fillHistogramExample
        - bin/gmclash
        - bin/gmmasscalc
        - bin/gmgeantino
        - bin/gm2gdml
        - share/FullSimLight/**
        - share/man/man1/fullSimLight.1
        - share/man/man1/gmclash.1
        - share/man/man1/gmgeantino.1
        - share/man/man1/gmmasscalc.1
    requirements:
      build:
        - ${{ compiler('cxx') }}
        - ${{ stdlib('c') }}
      host:
        - ${{ pin_subpackage('geomodel-core', exact=True) }}
        - ${{ pin_subpackage('geomodel-g4', exact=True) }}
        - ${{ pin_subpackage('geomodel-tools', exact=True) }}
        - eigen-abi-devel
        - geant4
        - xerces-c
        - nlohmann_json
      run_exports:
        weak:
          - ${{ pin_subpackage('geomodel-fullsimlight', upper_bound='x.x') }}
    tests:
      - package_contents:
          bin:
            - fullSimLight
            - gmclash
            - gmmasscalc
            - gmgeantino
            - gm2gdml
    about:
      homepage: https://geomodel.web.cern.ch/
      repository: https://gitlab.cern.ch/GeoModelDev/GeoModel
      summary: GeoModel FullSimLight Geant4 simulation driver
      description: |
        FullSimLight is a lightweight Geant4-based simulation driver
        for GeoModel geometries, used as a reference simulation and to
        run geometry clash, mass and geantino diagnostics (gmclash,
        gmmasscalc, gmgeantino).
      license: Apache-2.0
      license_file: LICENSE

  # ---- FullSimLight development files -------------------------------------
  - package:
      name: geomodel-fullsimlight-devel
      version: ${{ version }}
    inherit: geomodel-build
    build:
      files:
        - include/FullSimLight/**
        - lib/cmake/FullSimLight/**
    requirements:
      host:
        - ${{ pin_subpackage('geomodel-fullsimlight', exact=True) }}
        - ${{ pin_subpackage('geomodel-core-devel', exact=True) }}
        - ${{ pin_subpackage('geomodel-g4-devel', exact=True) }}
        - ${{ pin_subpackage('geomodel-tools-devel', exact=True) }}
        - eigen-abi-devel
        - geant4
        - xerces-c
        - nlohmann_json
      run:
        - ${{ pin_subpackage('geomodel-fullsimlight', exact=True) }}
        - ${{ pin_subpackage('geomodel-core-devel', exact=True) }}
        - ${{ pin_subpackage('geomodel-g4-devel', exact=True) }}
        - ${{ pin_subpackage('geomodel-tools-devel', exact=True) }}
        - eigen-abi-devel
        - geant4
        - xerces-c
        - nlohmann_json
      run_exports:
        weak:
          - ${{ pin_subpackage('geomodel-fullsimlight', upper_bound='x.x') }}
          - ${{ pin_compatible('eigen-abi', upper_bound='x.x.x.x') }}
    tests:
      - package_contents:
          files:
            - lib/cmake/FullSimLight/FullSimLightConfig.cmake
    about:
      homepage: https://geomodel.web.cern.ch/
      repository: https://gitlab.cern.ch/GeoModelDev/GeoModel
      summary: GeoModel FullSimLight development files (headers + CMake configs)
      description: |
        Development files for geomodel-fullsimlight: public headers
        and the FullSimLight CMake package config. Depend on this in
        host: to build against FullSimLight.
      license: Apache-2.0
      license_file: LICENSE

  # ---- Visualization (Qt6 / Coin3D / SoQt6 / HDF5) ------------------------
  - package:
      name: geomodel-visualization
      version: ${{ version }}
    inherit: geomodel-build
    build:
      files:
        - bin/gmex
        - bin/gmgraphbrowser
        - lib/libGX*.so*
        - lib/gxplugins/**
        - share/gmex/**
        - share/man/man1/gmex.1
    requirements:
      build:
        - ${{ compiler('cxx') }}
        - ${{ stdlib('c') }}
      host:
        - ${{ pin_subpackage('geomodel-core', exact=True) }}
        - eigen-abi-devel
        - qt6-main
        - coin3d
        - soqt6
        - hdf5
      run_exports:
        weak:
          - ${{ pin_subpackage('geomodel-visualization', upper_bound='x.x') }}
    tests:
      - package_contents:
          bin:
            - gmex
    about:
      homepage: https://geomodel.web.cern.ch/
      repository: https://gitlab.cern.ch/GeoModelDev/GeoModel
      summary: GeoModel Qt6/Coin3D visualization stack (VP1, gmex)
      description: |
        GeoModelVisualization provides the VP1-derived 3D visualization
        framework and the `gmex` geometry explorer GUI. Built on Qt6
        and Coin3D/SoQt6; opt-in because of the heavy GUI dependency
        stack.
      license: Apache-2.0
      license_file: LICENSE

  # ---- Visualization development files ------------------------------------
  - package:
      name: geomodel-visualization-devel
      version: ${{ version }}
    inherit: geomodel-build
    build:
      files:
        - include/VP1*/**
        - include/GX*/**
        - lib/cmake/GeoModelVisualization/**
    requirements:
      host:
        - ${{ pin_subpackage('geomodel-visualization', exact=True) }}
        - ${{ pin_subpackage('geomodel-core-devel', exact=True) }}
        - eigen-abi-devel
        - qt6-main
        - coin3d
        - soqt6
        - hdf5
      run:
        - ${{ pin_subpackage('geomodel-visualization', exact=True) }}
        - ${{ pin_subpackage('geomodel-core-devel', exact=True) }}
        - eigen-abi-devel
        - qt6-main
        - coin3d
        - soqt6
        - hdf5
      run_exports:
        weak:
          - ${{ pin_subpackage('geomodel-visualization', upper_bound='x.x') }}
          - ${{ pin_compatible('eigen-abi', upper_bound='x.x.x.x') }}
    tests:
      - package_contents:
          files:
            - lib/cmake/GeoModelVisualization/GeoModelVisualizationConfig.cmake
    about:
      homepage: https://geomodel.web.cern.ch/
      repository: https://gitlab.cern.ch/GeoModelDev/GeoModel
      summary: GeoModel visualization development files (headers + CMake configs)
      description: |
        Development files for geomodel-visualization: VP1/GX public
        headers and the GeoModelVisualization CMake package config.
      license: Apache-2.0
      license_file: LICENSE

  # ---- Metapackage --------------------------------------------------------
  - package:
      name: geomodel
      version: ${{ version }}
    build:
      noarch: generic
    requirements:
      run:
        - ${{ pin_subpackage('geomodel-core', exact=True) }}
        - ${{ pin_subpackage('geomodel-tools', exact=True) }}
        - ${{ pin_subpackage('geomodel-g4', exact=True) }}
        - ${{ pin_subpackage('geomodel-fullsimlight', exact=True) }}
    tests:
      - script:
          - test -f $PREFIX/bin/gmcat
          - test -f $PREFIX/bin/fullSimLight
    about:
      homepage: https://geomodel.web.cern.ch/
      repository: https://gitlab.cern.ch/GeoModelDev/GeoModel
      summary: GeoModel runtime metapackage (core + tools + G4 + FullSimLight)
      description: |
        Convenience metapackage that pulls in the core runtime
        GeoModel stack: geomodel-core, geomodel-tools, geomodel-g4
        and geomodel-fullsimlight. The visualization stack
        (geomodel-visualization) is opt-in and not pulled in by this
        metapackage. For development against GeoModel, depend on the
        matching -devel sub-packages (geomodel-core-devel, etc.).
      license: Apache-2.0
      license_file: LICENSE


about:
  homepage: https://geomodel.web.cern.ch/
  repository: https://gitlab.cern.ch/GeoModelDev/GeoModel
  summary: GeoModel detector-geometry toolkit (split outputs)
  description: |
    GeoModel is a lightweight, framework-agnostic C++ toolkit for
    describing detector geometries originally developed for the
    ATLAS experiment and now used by multiple HEP experiments. This
    recipe produces a split set of conda packages: core kernel + I/O
    (`geomodel-core`), command-line tools (`geomodel-tools`), Geant4
    conversion (`geomodel-g4`), the FullSimLight simulation driver
    (`geomodel-fullsimlight`), an opt-in visualization stack
    (`geomodel-visualization`), and a `geomodel` metapackage that
    pulls in everything except visualization. Each runtime output
    has a matching `-devel` sub-package carrying the public headers
    and CMake configs, following the eigen-feedstock case C
    convention so that downstream `find_package` consumers get the
    Eigen ABI marker (`eigen-abi`) propagated automatically.
  license: Apache-2.0
  license_file: LICENSE

extra:
  feedstock-name: geomodel
  recipe-maintainers:
    - olantwin
